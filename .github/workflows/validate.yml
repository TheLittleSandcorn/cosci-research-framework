name: CoSci Semantic Validation

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install rdflib python-frontmatter

      - name: Run Markdown to RDF Parser
        run: |
          python tools/markdown_to_rdf.py

      - name: Run Semantic Validator
        run: |
          python tools/validate_graph.py

